# ============================================================
# Pi-hole Package for Home Assistant
# Place this file in your packages/ directory and ensure
# homeassistant.packages is configured in configuration.yaml:
#
#   homeassistant:
#     packages: !include_dir_named packages/
#
# Required secrets (secrets.yaml):
#   pi_hole_api_url: http://<pihole-ip>/api
#   pi_hole_password: <your-pihole-password>
# ============================================================

# ----------------------------
# Input Boolean
# ----------------------------
input_boolean:
  pihole_blocking:
    name: Pi-Hole Ad-blocking
    initial: true
    icon: mdi:block-helper

# ----------------------------
# REST Commands
# ----------------------------
rest_command:
  pihole_login:
    url: "{{ api_url }}/auth"
    method: POST
    payload: '{ "password" : "{{ password }}" }'
    content_type: "application/json; charset=utf-8"
    verify_ssl: false

  pihole_logout:
    url: "{{ api_url }}/auth"
    method: DELETE
    verify_ssl: false
    headers:
      sid: "{{ sid }}"

  pihole_set_blocking:
    url: "{{ api_url }}/dns/blocking"
    method: POST
    payload: '{ "blocking" : {{ blocking }}, "timer" : {{ timer }} }'
    content_type: "application/json; charset=utf-8"
    verify_ssl: false
    headers:
      sid: "{{ sid }}"

  pihole_get_status:
    url: "{{ api_url }}/dns/blocking"
    method: GET
    verify_ssl: false
    headers:
      sid: "{{ sid }}"

# ----------------------------
# Scripts
# ----------------------------
script:
  pi_hole_disable:
    alias: "Pi-hole: Disable blocking"
    sequence:
      - action: rest_command.pihole_login
        data:
          api_url: !secret pi_hole_api_url
          password: !secret pi_hole_password
        response_variable: response
      - condition: template
        value_template: "{{ response['status'] == 200 }}"
      - variables:
          sid: "{{ response['content']['session']['sid'] }}"
      - action: rest_command.pihole_set_blocking
        data:
          api_url: !secret pi_hole_api_url
          sid: "{{ sid }}"
          blocking: "false"
          timer: "null"
      - action: rest_command.pihole_logout
        data:
          api_url: !secret pi_hole_api_url
          sid: "{{ sid }}"

  pi_hole_enable:
    alias: "Pi-hole: Enable blocking"
    sequence:
      - action: rest_command.pihole_login
        data:
          api_url: !secret pi_hole_api_url
          password: !secret pi_hole_password
        response_variable: response
      - condition: template
        value_template: "{{ response['status'] == 200 }}"
      - variables:
          sid: "{{ response['content']['session']['sid'] }}"
      - action: rest_command.pihole_set_blocking
        data:
          api_url: !secret pi_hole_api_url
          sid: "{{ sid }}"
          blocking: "true"
          timer: "null"
      - action: rest_command.pihole_logout
        data:
          api_url: !secret pi_hole_api_url
          sid: "{{ sid }}"

  pi_hole_check_status:
    alias: "Pi-hole: Check status"
    sequence:
      - action: rest_command.pihole_login
        data:
          api_url: !secret pi_hole_api_url
          password: !secret pi_hole_password
        response_variable: login_response
      - condition: template
        value_template: "{{ login_response['status'] == 200 }}"
      - variables:
          sid: "{{ login_response['content']['session']['sid'] }}"
      - action: rest_command.pihole_get_status
        data:
          api_url: !secret pi_hole_api_url
          sid: "{{ sid }}"
        response_variable: status_response
      - condition: template
        value_template: "{{ status_response['status'] == 200 }}"
      - variables:
          blocking_status: "{{ status_response['content']['blocking'] }}"
          blocking_timer: "{{ status_response['content']['timer'] }}"
          took: "{{ status_response['content']['took'] }}"
      - action: rest_command.pihole_logout
        data:
          api_url: !secret pi_hole_api_url
          sid: "{{ sid }}"